<section class="login">
  <div class="login__card surface-card">
    <header class="login__header">
      <p class="page-eyebrow">Secure access</p>
      <h1 class="page-title">Product Catalog</h1>
      <p class="page-subtitle">
        Sign in with your assessment credentials to access the product catalog.
      </p>
    </header>

    @if (infoMessage(); as infoMessage) {
      <div class="login__notice login__notice--info" role="status">
        {{ infoMessage }}
      </div>
    }

    @if (errorMessage(); as errorMessage) {
      <app-error-message [message]="errorMessage" />
    }

    <form class="login__form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <label class="login__field">
        <span class="login__field-label">Username</span>
        <input
          type="text"
          formControlName="username"
          placeholder="Enter your username"
          autocomplete="username"
          [class.login__input--invalid]="hasControlError('username')"
        />
        @if (hasControlError('username')) {
          <span class="login__field-error">Username is required.</span>
        }
      </label>

      <label class="login__field">
        <span class="login__field-label">Password</span>
        <input
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          [class.login__input--invalid]="hasControlError('password')"
        />
        @if (hasControlError('password')) {
          <span class="login__field-error">Password is required.</span>
        }
      </label>

      <button class="button-primary login__submit" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </div>
</section>
